<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ModVault — Minecraft Mod Manager</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased">
  <nav class="fixed top-0 left-0 right-0 z-40 border-b border-gray-800 bg-gray-950/80 backdrop-blur-lg">
    <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="#/" class="flex items-center gap-2 text-lg font-bold tracking-tight">
        <svg class="w-6 h-6 text-emerald-400" fill="currentColor" viewBox="0 0 32 32"><path d="M26.06 3.08a3 3 0 00-4.24 0l-2.12 2.12-1.06 1.06-2.3 2.3-2.12 2.12-1.06-1.06a2 2 0 00-2.83 0L8.05 11.3a2 2 0 000 2.83l1.06 1.06L4.4 19.9a2 2 0 000 2.83l4.95 4.95a2 2 0 002.83 0l4.71-4.71 1.06 1.06a2 2 0 002.83 0l2.82-2.83a2 2 0 000-2.83l-1.06-1.06 2.12-2.12 2.3-2.3 1.06-1.06 2.12-2.12a3 3 0 000-4.24z"/></svg>
        ModVault
      </a>
      <div class="flex items-center gap-3">
        <a href="#/cart" class="relative p-2 hover:text-emerald-400 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.3 6.3a1 1 0 00.9 1.4h12.8a1 1 0 00.9-1.4L17 13M7 13h10"/><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/></svg>
          <span id="cart-badge" class="absolute -top-1 -right-1 bg-emerald-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center hidden">0</span>
        </a>
        <div class="flex gap-1 text-xs font-medium bg-gray-800 rounded-lg p-0.5">
          <button data-lang="en" class="lang-btn px-2 py-1 rounded-md active">EN</button>
          <button data-lang="ru" class="lang-btn px-2 py-1 rounded-md">RU</button>
        </div>
      </div>
    </div>
  </nav>

  <main id="app" class="pt-14 min-h-screen"></main>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
